#  ╔══════════════════════════════════════════════════════════════════════════╗
#  ║                    ✦  S H I T G A M E S  ✦                               ║
#  ║        ТнтРан  ❖  Сплиф  ❖  Царь горы                                    ║
#  ╠══════════════════════════════════════════════════════════════════════════╣
#  ║  Поддерживаемые форматы цвета:                                           ║
#  ║    &a &e &7 ...        — классические коды                               ║
#  ║    &#FFD166            — HEX-цвет                                        ║
#  ║    <gradient:#a:#b>    — MiniMessage (включается, если в строке есть "<") ║
#  ║                                                                          ║
#  ║  Формат звука:    namespace:key громкость высота                         ║
#  ║  Формат частиц:   ЧАСТИЦА кол-во сдвигX сдвигY сдвигZ скорость           ║
#  ║  Отключить звук/частицу — напишите "none"                                ║
#  ╚══════════════════════════════════════════════════════════════════════════╝

settings:
  # Префикс, подставляется вместо %prefix% в любом сообщении
  prefix: "&#FFD166✦ &#FFE9A8ShitGames &#4A4A4A┃ &r"
  # Команды, разрешённые игроку, пока он находится на арене (без слэша)
  allowed-commands:
    - "sg"
    - "shitgames"
  # Блокировать все остальные команды на арене
  block-commands: true
  # Запрещать телепортацию игрока сторонними плагинами, пока он на арене
  deny-teleport: true
  # Радиус (в блоках) от точки лобби, дальше которого игрока вернёт обратно
  lobby-radius: 60.0
  # Максимальный объём выделения топориком (защита от случайного выделения полмира)
  max-selection-volume: 2000000
  # Защищать блоки арен от посторонних игроков (не участников)
  protect-arenas: true
  # Подробные логи в консоль
  debug: false

# ─────────────────────────────  ОБЩИЕ ПРАВИЛА ИГР  ─────────────────────────────
game:
  # Минимум игроков для старта отсчёта
  min-players: 2
  # Максимум игроков на арене (можно переопределить для арены: /sg limits <арена> <мин> <макс>)
  max-players: 16
  # Длительность отсчёта в лобби, сек
  lobby-countdown: 45
  # Укороченный отсчёт, если набрался максимум игроков, сек
  short-countdown: 10
  # На каких секундах объявлять отсчёт
  countdown-announce-at: [ 45, 30, 20, 15, 10, 5, 4, 3, 2, 1 ]
  # Защита в начале раунда: блоки не проваливаются и не ломаются, сек
  grace-seconds: 3
  # Пауза после победы перед возвратом игроков, сек
  end-delay-seconds: 6
  # Время до "сужения зоны" (боссбар), сек
  zone-timer-seconds: 300
  # Сколько блоков ставить за тик при подготовке арены (больше = быстрее, но тяжелее)
  reset-blocks-per-tick: 6000
  # Выбывает ли игрок, покинувший границы арены во время игры
  eliminate-outside-region: true

  # Принудительное разрушение блоков после того, как время вышло
  shrink:
    enabled: true
    # Базовое количество ломаемых блоков в секунду
    blocks-per-second: 12
    # Прибавка к скорости разрушения
    acceleration: 6
    # Каждые сколько секунд применяется прибавка
    acceleration-interval: 10
    # Жёсткий предел блоков в секунду
    max-blocks-per-second: 160

# ─────────────────────────────────  МИНИ-ИГРЫ  ─────────────────────────────────
games:
  tnt-run:
    enabled: true
    # Блок, которым заполняются слои
    layer-material: TNT
    # Коврик поверх верхнего ряда слоя (выпадать предметом не будет)
    cover-material: WHITE_CARPET
    # Задержка между шагом на коврик и обвалом, тиков (20 тиков = 1 сек)
    fall-delay-ticks: 6
    # Спавнить красивый падающий блок динамита (false = блок просто исчезает)
    falling-block-entity: true
    # Через сколько тиков падающий блок удаляется
    falling-block-lifetime-ticks: 100

  spleef:
    enabled: true
    # Блок, которым заполняются слои
    layer-material: SNOW_BLOCK
    # Лопата, выдаваемая участникам
    tool:
      material: DIAMOND_SHOVEL
      slot: 0
      name: "&#6BD6FF⛏ &fЛопата спливера"
      lore:
        - "&#4A4A4A▎ &7Ломай снег под ногами соперников"
        - "&#4A4A4A▎ &7и сбрось их этажом ниже!"
      efficiency-level: 5
      unbreakable: true
      glow: false

# ───────────────────────────────  ДВОЙНОЙ ПРЫЖОК  ──────────────────────────────
double-jump:
  enabled: true
  # Раз в сколько секунд разыгрывается выдача предмета
  give-interval-seconds: 20
  # Шанс выдачи каждому игроку при розыгрыше (0.0 - 1.0)
  chance: 0.4
  # Сколько зарядов максимум может быть в руках
  max-amount: 2
  # Сила прыжка вверх
  power: 0.95
  # Дополнительный толчок вперёд по направлению взгляда
  forward-boost: 0.35
  item:
    material: FEATHER
    slot: 4
    name: "&#C08CFF✧ &bДвойной прыжок"
    lore:
      - "&#4A4A4A▎ &7ПКМ в воздухе — ещё один прыжок"
      - "&#4A4A4A▎ &7Заряд расходуется при использовании"
    glow: true
    unbreakable: true

# ──────────────────────────────  ГОЛОСОВАНИЕ ЗА ИГРУ  ──────────────────────────
vote:
  item:
    material: NETHER_STAR
    slot: 4
    name: "&eВыбор игры"
    lore:
      - "&#4A4A4A▎ &7ПКМ — открыть меню голосования"
    glow: true
    unbreakable: true
  menu:
    title: "&#1E1E1E❖ &#FFD166Выбор мини-игры"
    rows: 3
    filler:
      enabled: true
      material: GRAY_STAINED_GLASS_PANE
      name: " "
    # Строки, добавляемые к описанию иконок (%votes%, %percent%, %chosen%)
    vote-lore:
      - ""
      - "&#4A4A4A▎ &7Голосов: &#FFD166%votes% &8(&7%percent%%&8)"
      - "&#4A4A4A▎ &7Ваш выбор: &f%chosen%"
      - "&#4A4A4A▎ &fКлик &7— проголосовать"
    tnt-run:
      material: TNT
      slot: 11
      name: "&#FF6B6B✦ ТнтРан"
      lore:
        - "&#4A4A4A▎ &7Беги без остановки — динамит"
        - "&#4A4A4A▎ &7проваливается под ногами"
    spleef:
      material: SNOW_BLOCK
      slot: 15
      name: "&#6BD6FF❄ Сплиф"
      lore:
        - "&#4A4A4A▎ &7Ломай снег лопатой и сбрасывай"
        - "&#4A4A4A▎ &7соперников этажом ниже"

# ─────────────────────────────────  БОССБАРЫ  ──────────────────────────────────
bossbar:
  arena:
    # %time% — оставшееся время в формате MM:SS
    title: "&#FFD166⌛ &fДо сужения зоны: &#FFE9A8%time%"
    expired-title: "&#FF6B6B⚡ Время вышло! Арена разрушается!"
    # PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    color: YELLOW
    expired-color: RED
    # PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    style: PROGRESS

# ───────────────────────────────────  ТИТРЫ  ───────────────────────────────────
titles:
  fade-in: 6
  stay: 40
  fade-out: 8

# ──────────────────────────────────  НАГРАДЫ  ──────────────────────────────────
rewards:
  # Плейсхолдеры: %player% %uuid% %arena% %game%
  winner-commands:
    - "give %player% diamond 3"
  # Выдаётся всем, кто дожил до конца раунда
  participation-commands: [ ]

# ─────────────────────────────────  ЦАРЬ ГОРЫ  ─────────────────────────────────
king-of-the-hill:
  enabled: true
  # Сколько секунд нужно простоять на вершине в одиночку
  capture-seconds: 20
  # Как часто обновляется боссбар захвата, тиков
  update-ticks: 4
  # Сбрасывать прогресс полностью, если игрок сошёл с вершины
  reset-progress-on-leave: false
  # Если прогресс не сбрасывается — сколько секунд прогресса теряется за секунду вне вершины
  progress-loss-per-second: 1
  # Что показывать в %shitgames_king%, если царя нет
  no-king: "&#8A8A8AНикого"
  # Пауза между сообщениями о том, что вершина занята несколькими игроками, сек
  contest-message-cooldown: 4
  # Команды при захвате вершины (%player%, %uuid%)
  reward-commands: [ ]
  bossbar:
    # %percent% — прогресс, %player% — захватчик, %king% — текущий царь
    title: "&#FFD166♛ &fЗахват вершины &8• &#FFE9A8%percent%%"
    color: YELLOW
    style: NOTCHED_10

# ───────────────────────────────  НАСТРОЙКА АРЕН  ──────────────────────────────
